apiVersion: 1

providers:
  - name: "FinOps Dashboards"
    orgId: 1
    folder: "FinOps Cost Governance"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
